<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Tarefas - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>Minhas Tarefas</h1>
            <button id="logout-btn" class="btn-secondary">Sair</button>
        </header>

        <form id="todo-form" class="todo-form">
            <input type="text" id="task-input" required placeholder="Digite uma nova tarefa...">
            <button type="submit">Adicionar</button>
        </form>

        <ul id="task-list" class="task-list">
            <li class="task-item">
                <span>Exemplo de Tarefa 1</span>
                <div class="task-actions">
                    <button class="btn-edit">Editar</button>
                    <button class="btn-delete">Excluir</button>
                </div>
            </li>
            <li class="task-item">
                <span>Exemplo de Tarefa 2</span>
                <div class="task-actions">
                    <button class="btn-edit">Editar</button>
                    <button class="btn-delete">Excluir</button>
                </div>
            </li>
        </ul>
    </div>

</body>
</html>
