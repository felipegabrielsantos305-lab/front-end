<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Lista de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <h2>Criar Nova Conta</h2>
        
        <form id="register-form">
            <div class="input-group">
                <label for="name">Nome Completo:</label>
                <input type="text" id="name" required placeholder="Seu nome">
            </div>

            <div class="input-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" required placeholder="seu@email.com">
            </div>
            
            <div class="input-group">
                <label for="password">Senha:</label>
                <input type="password" id="password" required placeholder="Crie uma senha">
            </div>
            
            <button type="submit">Cadastrar</button>
        </form>
        
        <p>Já tem uma conta? <a href="index.html">Faça login aqui</a></p>
    </div>

</body>
</html>
